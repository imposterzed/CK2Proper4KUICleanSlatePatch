name: Bug report
description: Report an icon that doesn't render as expected on Proper 4K UI Project - CleanSlate Patch.
title: "[Bug]: "
labels: ["bug"]
assignees:
  - imposterzed
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! A few quick fields help me reproduce and fix it faster.

        For general "how do I..." questions, please use [Discussions](../discussions) instead.

  - type: dropdown
    id: mod-version
    attributes:
      label: Mod version
      description: |
        Found in the mod's `.mod` file or on the [Releases page](../releases). If you're on a pre-1.0 development build, pick "Older / unknown" and note the specific version in the description.
      options:
        - v1.0.x (current)
        - Older / unknown
    validations:
      required: true

  - type: checkboxes
    id: mod-stack
    attributes:
      label: Mods loaded alongside Proper 4K UI Project - CleanSlate Patch
      description: This patch requires both CleanSlate and Proper 4K UI Project. Check whichever applies.
      options:
        - label: CK2Plus (with the CK2Plus - Proper 4K UI Compatibility Submod)
        - label: Other mods (please list in the description)
        - label: None — just CleanSlate + Proper 4K UI Project

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A short paragraph describing the bug. Which icon renders wrong (or doesn't render)? What did you expect vs what you saw?
      placeholder: |
        Under CleanSlate + Proper 4K UI Project + this patch, the "Promised a Title" modifier icon still renders as a sword-and-helmet instead of a Prestige crown. Expected the crown after installing the patch.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: |
        If you can reproduce the bug deliberately, please share the steps. If it was a one-off, leave this blank.
      placeholder: |
        1. Load a save with CleanSlate + Proper 4K UI Project + this patch enabled.
        2. Console: `add_modifier promised_a_title <charID> -1`
        3. Observe the modifier icon in the character sheet.

  - type: textarea
    id: log-snippets
    attributes:
      label: Log snippets
      description: |
        Logs live at `Documents/Paradox Interactive/Crusader Kings II/logs/`.
        - Paste any lines from **`setup.log`** that mention the mod (search for `Proper4KUICleanSlatePatch`) — this confirms the mod loaded and what order it loaded in.
        - Paste any lines from **`error.log`** that mention the mod's files, if any.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Icon context
      description: Optional — helps me match the report to the right asset.
      value: |
        - Icon type (trait / modifier):
        - Icon name or trait ID:
        - CK2 version:

  - type: textarea
    id: notes
    attributes:
      label: Anything else
      description: |
        Screenshots, save files, hunches, anything else that might help.
        *You can drag-and-drop or paste screenshots directly into this field — GitHub will upload them automatically.*
